spring:
  application:
    name: playground-spring-boot
  datasource:
    url: jdbc:mysql://localhost:3306/playground_spring_boot
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

logging:
  level:
    com.playground: INFO
