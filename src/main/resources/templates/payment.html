<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #f8f9fa 0%, #e9ecef 100%);
      }
      .demo-card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <h1 class="h3 mb-4 text-center">Payment</h1>

          <div class="card demo-card mb-4">
            <div class="card-header bg-secondary text-white">Calculate</div>
            <div class="card-body">
              <form
                th:action="@{/payment}"
                th:object="${paymentRequest}"
                method="post"
                class="row g-3"
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <div class="col-12">
                  <label class="form-label" for="amount">Amount</label>
                  <input
                    type="text"
                    class="form-control"
                    id="amount"
                    autocomplete="off"
                    th:field="*{amount}"
                    th:classappend="${#fields.hasErrors('amount')} ? ' is-invalid'"
                    placeholder="e.g. 100.00"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('amount')}"
                    th:errors="*{amount}"
                  >
                    Amount error
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label" for="taxRate">Tax rate</label>
                  <input
                    type="text"
                    class="form-control"
                    id="taxRate"
                    autocomplete="off"
                    th:field="*{taxRate}"
                    th:classappend="${#fields.hasErrors('taxRate')} ? ' is-invalid'"
                    placeholder="0.14"
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('taxRate')}"
                    th:errors="*{taxRate}"
                  >
                    Tax rate error
                  </div>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Calculate</button>
                </div>
              </form>

              <div th:if="${error}" class="alert alert-danger mt-3 mb-0" role="alert" th:text="${error}">
                Error
              </div>
            </div>
          </div>

          <div th:if="${hasResult}" class="card demo-card">
            <div class="card-header bg-success text-white">Result</div>
            <div class="card-body">
              <dl class="row mb-0">
                <dt class="col-sm-3">Amount</dt>
                <dd class="col-sm-9" th:text="${paymentResult.amount().toPlainString()}">—</dd>
                <dt class="col-sm-3">Tax</dt>
                <dd class="col-sm-9" th:text="${paymentResult.tax().toPlainString()}">—</dd>
                <dt class="col-sm-3">Total</dt>
                <dd class="col-sm-9 fw-semibold" th:text="${paymentResult.total().toPlainString()}">—</dd>
              </dl>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
